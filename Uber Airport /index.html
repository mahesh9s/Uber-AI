   API LAYER
   Structured to mirror real endpoint contracts so swapping in
   live providers is a one-line change. Default = mock with
   realistic latency and response shape.
   ───────────────────────────────────────────────────────────── */

const API = {
  // AviationStack-shaped flight lookup.
  // Real swap: fetch(`https://api.aviationstack.com/v1/flights?access_key=${KEY}&flight_iata=${iata}`)
  lookupFlight: async (iata) => {
    await sleep(900);
    const flights = MOCK_FLIGHTS[iata.toUpperCase()];
    if (!flights) throw new Error(`Flight ${iata} not found`);
    return flights;
  },

  // Airport intelligence — TSA, gate walk, lounges.
  // Real swap: TSA wait API + airport ops feeds.
  airportIntel: async (iata, terminal) => {
    await sleep(600);
    return MOCK_AIRPORT_INTEL[`${iata}-${terminal}`] || MOCK_AIRPORT_INTEL.default;
  },

  // Uber Eats at airport — curated by terminal.
  // Real swap: Uber Eats merchant API filtered by airport_zone.
  airportEats: async (iata, terminal) => {
    await sleep(500);
    return MOCK_AIRPORT_EATS[`${iata}-${terminal}`] || [];
  },

  // Baggage status — usually airline + airport ops.
  baggageStatus: async (flightIata) => {
    await sleep(700);
    return MOCK_BAGGAGE[flightIata] || { carousel: '5', eta_minutes: 8, status: 'arriving' };
  },

  // Destination intelligence — fare estimate + nearby food + weather.
  destinationIntel: async (iata) => {
    await sleep(800);
    return MOCK_DESTINATION[iata] || MOCK_DESTINATION.default;
  },
};

const sleep = (ms) => new Promise(r => setTimeout(r, ms));

/* ─────────────────────────────────────────────────────────────
   SCREEN 2 — Add Flight
   ───────────────────────────────────────────────────────────── */

const Screen2_AddFlight = ({ onSubmit, onBack }) => {
  const [query, setQuery] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);

  const recents = [
    { iata: 'DL458', route: 'SFO → JFK', date: 'Today, 6:30 PM' },
    { iata: 'UA1242', route: 'SFO → ORD', date: 'Today, 7:00 PM' },
  ];

  const handleLookup = async (iata) => {
    setLoading(true); setError(null);
    try {
      const flight = await API.lookupFlight(iata);
      onSubmit(flight);
    } catch (e) {
      setError(e.message);
      setLoading(false);
    }
  };

  return (
    <div className="flex-1 overflow-y-auto bg-white">
      <div className="px-5 pt-4 pb-2 flex items-center gap-3 border-b border-neutral-100">
        <button onClick={onBack} className="w-10 h-10 rounded-full hover:bg-neutral-100 flex items-center justify-center text-xl">←</button>
        <h2 className="text-lg font-bold">Add your flight</h2>
      </div>

      <div className="px-5 pt-6 pb-32">
        <p className="text-sm text-neutral-500 mb-5">We use this to surface gate info, TSA waits, and food at your terminal — only while you're traveling.</p>

        {/* Auto-detect option */}
        <button className="w-full bg-blue-50 border border-blue-100 rounded-2xl p-4 mb-5 text-left flex items-center gap-3 hover:bg-blue-100 transition">
          <div className="w-10 h-10 rounded-full bg-blue-500 flex items-center justify-center text-white text-lg">📧</div>
          <div className="flex-1">
            <p className="font-semibold text-sm">Find from your email</p>
            <p className="text-xs text-neutral-500">Connect Gmail to auto-detect today's flight</p>
          </div>
          <span className="text-blue-500 text-xl">→</span>
        </button>

        <div className="flex items-center gap-3 mb-5">
          <div className="flex-1 h-px bg-neutral-200"></div>
          <span className="text-xs text-neutral-400 font-semibold">OR ENTER MANUALLY</span>
          <div className="flex-1 h-px bg-neutral-200"></div>
        </div>

        {/* Manual entry */}
        <label className="block text-xs font-semibold text-neutral-500 mb-2 uppercase tracking-wide">Flight number</label>
        <div className="relative mb-3">
          <input
            value={query}
            onChange={(e) => setQuery(e.target.value.toUpperCase())}
            placeholder="e.g. DL458"
            className="w-full bg-neutral-100 rounded-xl px-4 py-4 text-base font-semibold outline-none focus:ring-2 focus:ring-black"
          />
        </div>
        {error && <p className="text-sm text-red-600 mb-3">⚠ {error}</p>}
        <button
          onClick={() => handleLookup(query)}
          disabled={!query || loading}
          className="w-full bg-black text-white font-bold rounded-xl py-4 mb-6 disabled:opacity-40 flex items-center justify-center gap-2"
        >
          {loading ? <><Spinner size={18}/> Looking up flight…</> : 'Find my flight'}
        </button>

        <p className="text-xs font-semibold text-neutral-500 mb-3 uppercase tracking-wide">Recent searches</p>
        {recents.map((r) => (
          <button key={r.iata} onClick={() => handleLookup(r.iata)} className="w-full bg-white border border-neutral-200 rounded-xl p-4 mb-2 text-left flex items-center gap-3 hover:bg-neutral-50">
            <div className="w-10 h-10 rounded-full bg-neutral-100 flex items-center justify-center text-lg">✈️</div>
            <div className="flex-1">
              <p className="font-semibold text-sm">{r.iata}</p>
              <p className="text-xs text-neutral-500">{r.route} • {r.date}</p>
            </div>
            <span className="text-neutral-400">→</span>
          </button>
        ))}
      </div>
    </div>
  );
};

const Screen3_FlightIntel = ({ flight, onNext, onBack }) => {
  const [intel, setIntel] = useState(null);
  const [eats, setEats] = useState([]);
  const [loading, setLoading] = useState(true);
  const [timelineOpen, setTimelineOpen] = useState(true);
  const [foodOpen, setFoodOpen] = useState(true);

  useEffect(() => {
    let alive = true;
    (async () => {
      const [i, e] = await Promise.all([
        API.airportIntel(flight.departure.iata, flight.departure.terminal),
        API.airportEats(flight.departure.iata, flight.departure.terminal),
      ]);
      if (!alive) return;
      setIntel(i); setEats(e); setLoading(false);
    })();
    return () => { alive = false; };
  }, []);

  const departTime = new Date(flight.departure.estimated);
  const departStr = departTime.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
  const delayed = flight.departure.delay_minutes > 0;

  return (
    <div className="flex-1 overflow-y-auto bg-neutral-50">
      <div className="px-5 pt-4 pb-3 flex items-center gap-3 bg-white border-b border-neutral-100">
        <button onClick={onBack} className="w-10 h-10 rounded-full hover:bg-neutral-100 flex items-center justify-center text-xl">←</button>
        <div className="flex-1">
          <h2 className="text-base font-bold">{flight.flight.iata} • {flight.airline.name}</h2>
          <p className="text-xs text-neutral-500">Live airport intelligence</p>
        </div>
        <div className="flex items-center gap-1 text-[10px] text-emerald-600 font-bold">
          <span className="w-1.5 h-1.5 rounded-full bg-emerald-500"></span> LIVE
        </div>
      </div>

      <div className="px-5 pt-4 pb-32">
        {/* Flight status hero */}
        <div className="bg-white rounded-2xl p-5 mb-3 shadow-sm">
          <div className="flex items-center justify-between mb-4">
            <div>
              <p className="text-xs text-neutral-500 font-semibold uppercase">Departing</p>
              <p className="text-3xl font-bold tracking-tight">{flight.departure.iata}</p>
              <p className="text-xs text-neutral-500">T{flight.departure.terminal} • Gate {flight.departure.gate}</p>
            </div>
            <div className="flex-1 px-4 flex flex-col items-center">
              <div className="w-full h-px bg-neutral-200 relative">
                <div className="absolute -top-1.5 left-0 w-3 h-3 rounded-full bg-black"></div>
                <div className="absolute -top-1.5 right-0 w-3 h-3 rounded-full bg-neutral-300 border-2 border-white"></div>
              </div>
              <span className="text-base mt-2">✈️</span>
            </div>
            <div className="text-right">
              <p className="text-xs text-neutral-500 font-semibold uppercase">Arriving</p>
              <p className="text-3xl font-bold tracking-tight">{flight.arrival.iata}</p>
              <p className="text-xs text-neutral-500">T{flight.arrival.terminal} • Gate {flight.arrival.gate}</p>
            </div>
          </div>
          <div className={`flex items-center justify-between p-3 rounded-xl ${delayed ? 'bg-amber-50' : 'bg-emerald-50'}`}>
            <div>
              <p className={`text-xs font-bold uppercase ${delayed ? 'text-amber-800' : 'text-emerald-800'}`}>
                {delayed ? `Delayed ${flight.departure.delay_minutes} min` : 'On time'}
              </p>
              <p className="text-sm font-semibold">Departs {departStr}</p>
            </div>
            <div className="text-right">
              <p className="text-xs text-neutral-500">Boarding starts</p>
              <p className="text-sm font-semibold">{new Date(departTime.getTime() - 30*60000).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' })}</p>
            </div>
          </div>
        </div>

        {/* Airport intel grid */}
        <p className="text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2 px-1">At {flight.departure.iata} Terminal {flight.departure.terminal}</p>
        {loading ? (
          <div className="grid grid-cols-2 gap-2 mb-3">
            {[1,2,3,4].map(i => <div key={i} className="bg-white rounded-2xl h-[88px] shimmer"/>)}
          </div>
        ) : (
          <div className="grid grid-cols-2 gap-2 mb-3">
            <IntelStat icon="🛂" label="TSA wait" value={`${intel.tsa_wait_minutes} min`} sub={`PreCheck: ${intel.tsa_precheck_wait_minutes} min`} />
            <IntelStat icon="🚶" label="Walk to gate" value={`${intel.walk_to_gate_minutes} min`} sub="From security" />
            <IntelStat icon="🛫" label="Terminal & gate" value={`T${flight.departure.terminal} • ${flight.departure.gate}`} sub={flight.airline.name} />
            <IntelStat icon="🛋️" label="Lounge" value={intel.lounges[0]?.name || '—'} sub={intel.lounges[0] ? `${intel.lounges[0].distance_minutes} min walk` : ''} />
          </div>
        )}

        {/* Timeline (collapsible) */}
        <div className="bg-white rounded-2xl mb-3 shadow-sm overflow-hidden">
          <button onClick={() => setTimelineOpen(o => !o)} className="w-full flex items-center justify-between p-4 hover:bg-neutral-50">
            <p className="text-[11px] font-bold text-neutral-500 uppercase tracking-wider">Your timeline</p>
            <span className={`w-8 h-8 rounded-full bg-neutral-100 flex items-center justify-center text-neutral-700 text-base font-bold transition-transform ${timelineOpen ? 'rotate-180' : ''}`}>▾</span>
          </button>
          {timelineOpen && (
            <div className="px-4 pb-4">
              {[
                { time: '5:48 PM', label: 'Drop-off at SFO T2', icon: '🚗', active: true },
                { time: '5:55 PM', label: 'Bag drop & TSA', icon: '🛂' },
                { time: '6:13 PM', label: 'Through security', icon: '✅' },
                { time: '6:20 PM', label: 'Arrive at Gate B22', icon: '🚪' },
              ].map((t, i, arr) => (
                <div key={i} className="flex items-start gap-3 relative">
                  {i < arr.length - 1 && <div className="absolute left-[15px] top-7 w-px h-7 bg-neutral-200"></div>}
                  <div className={`w-8 h-8 rounded-full flex items-center justify-center text-sm flex-shrink-0 ${t.active ? 'bg-black text-white' : t.highlight ? 'bg-emerald-500 text-white' : 'bg-neutral-100'}`}>{t.icon}</div>
                  <div className="flex-1 pb-3">
                    <div className="flex items-center justify-between">
                      <p className="text-sm font-semibold">{t.label}</p>
                      <p className={`text-xs font-semibold ${t.amber ? 'text-amber-600' : 'text-neutral-500'}`}>{t.time}</p>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Food near gate — aggregator across the terminal (collapsible) */}
        <div className="bg-white rounded-2xl mb-3 shadow-sm overflow-hidden">
          <button onClick={() => setFoodOpen(o => !o)} className="w-full flex items-center justify-between p-4 hover:bg-neutral-50">
            <div className="text-left">
              <p className="text-[11px] font-bold text-neutral-500 uppercase tracking-wider">Food near Gate {flight.departure.gate}</p>
              <p className="text-sm font-semibold">{eats.length} options at Terminal {flight.departure.terminal}</p>
            </div>
            <span className={`w-8 h-8 rounded-full bg-neutral-100 flex items-center justify-center text-neutral-700 text-base font-bold transition-transform ${foodOpen ? 'rotate-180' : ''}`}>▾</span>
          </button>
          {foodOpen && (
            <div className="px-4 pb-4">
              <p className="text-[11px] text-neutral-500 mb-3">Within walking distance of your gate</p>

              {/* Filter chips */}
              <div className="flex gap-1.5 mb-3 overflow-x-auto -mx-1 px-1">
                <button className="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-black text-white whitespace-nowrap">All</button>
                <button className="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-neutral-100 text-neutral-700 whitespace-nowrap">Coffee</button>
                <button className="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-neutral-100 text-neutral-700 whitespace-nowrap">Quick bite</button>
                <button className="text-[11px] font-semibold px-2.5 py-1 rounded-full bg-neutral-100 text-neutral-700 whitespace-nowrap">Sit-down</button>
              </div>

              <div className="space-y-2">
                {eats.map((e) => (
                  <div key={e.id} className="flex items-center gap-3 p-2 -mx-2 rounded-xl hover:bg-neutral-50">
                    <div className="w-12 h-12 bg-neutral-100 rounded-xl flex items-center justify-center text-2xl flex-shrink-0">{e.image}</div>
                    <div className="flex-1 min-w-0">
                      <p className="font-semibold text-sm truncate">{e.name}</p>
                      <p className="text-[11px] text-neutral-500 truncate">{e.cuisine} • {e.price} • ⭐ {e.rating}</p>
                      <p className="text-[11px] text-neutral-400">{e.hours}</p>
                    </div>
                    <div className="text-right flex-shrink-0">
                      <p className="text-sm font-bold">{e.walk_minutes}m</p>
                      <p className="text-[10px] text-neutral-500 leading-none">walk</p>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}
        </div>

        <button onClick={onNext} className="w-full bg-black text-white font-bold rounded-xl py-4 mt-2">
          Continue trip →
        </button>
      </div>
    </div>
  );
};

const IntelStat = ({ icon, label, value, sub }) => (
  <div className="bg-white rounded-2xl p-3 shadow-sm">
    <div className="flex items-center gap-2 mb-2">
      <span className="text-lg">{icon}</span>
      <p className="text-[10px] font-bold text-neutral-500 uppercase tracking-wider">{label}</p>
    </div>
    <p className="text-base font-bold leading-tight">{value}</p>
    {sub && <p className="text-[11px] text-neutral-500 mt-0.5">{sub}</p>}
  </div>
);

/* ─────────────────────────────────────────────────────────────
   SCREEN 5 — Landed at Destination
   ───────────────────────────────────────────────────────────── */

const Screen5_Landed = ({ flight, onBack, onRestart }) => {
  const [dest, setDest] = useState(null);
  const [bag, setBag] = useState(null);
  const [loading, setLoading] = useState(true);
  const [selected, setSelected] = useState(0);

  useEffect(() => {
    let alive = true;
    (async () => {
      const [d, b] = await Promise.all([
        API.destinationIntel(flight.arrival.iata),
        API.baggageStatus(flight.flight.iata),
      ]);
      if (!alive) return;
      setDest(d); setBag(b); setLoading(false);
    })();
    return () => { alive = false; };
  }, []);

  if (loading) {
    return (
      <div className="flex-1 flex items-center justify-center bg-white">
        <div className="text-center">
          <Spinner size={28}/>
          <p className="text-sm text-neutral-500 mt-3">Pulling destination data…</p>
        </div>
      </div>
    );
  }

  return (
    <div className="flex-1 overflow-y-auto bg-neutral-50">
      <div className="px-5 pt-4 pb-3 flex items-center gap-3 bg-white border-b border-neutral-100">
        <button onClick={onBack} className="w-10 h-10 rounded-full hover:bg-neutral-100 flex items-center justify-center text-xl">←</button>
        <div className="flex-1">
          <h2 className="text-base font-bold">Welcome to {flight.arrival.iata}</h2>
          <p className="text-xs text-neutral-500">Landed 9:15 PM • {dest.weather.icon} {dest.weather.temp_f}°F {dest.weather.condition}</p>
        </div>
      </div>

      <div className="px-5 pt-4 pb-32">
        {/* Baggage card */}
        <div className="bg-white rounded-2xl p-4 mb-3 shadow-sm">
          <div className="flex items-center gap-3">
            <div className="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center text-2xl">🧳</div>
            <div className="flex-1">
              <div className="flex items-center gap-2">
                <p className="font-bold text-sm">Carousel {bag.carousel}</p>
                <Pill color="blue">{bag.status}</Pill>
              </div>
              <p className="text-xs text-neutral-500">First bag in ~{bag.eta_minutes} min</p>
            </div>
            <span className="text-xs font-semibold text-blue-600">Directions →</span>
          </div>
        </div>

        {/* Connecting flight card */}
        {flight.connecting_flight && (() => {
          const conn = flight.connecting_flight;
          const departTime = new Date(conn.scheduled).toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
          const layoverH = Math.floor(conn.layover_minutes / 60);
          const layoverM = conn.layover_minutes % 60;
          return (
            <div className="bg-white rounded-2xl p-4 mb-3 shadow-sm">
              <div className="flex items-center justify-between mb-3">
                <p className="text-[11px] font-bold text-neutral-500 uppercase tracking-wider">Connecting flight</p>
                <Pill color="green">On time</Pill>
              </div>
              <div className="flex items-center gap-3 mb-3">
                <div className="w-12 h-12 rounded-full bg-blue-50 flex items-center justify-center text-2xl">✈️</div>
                <div className="flex-1">
                  <div className="flex items-center gap-2">
                    <p className="font-bold text-base">{conn.flight_iata}</p>
                    <span className="text-sm text-neutral-500">→ {conn.to.iata}</span>
                  </div>
                  <p className="text-xs text-neutral-500">{conn.airline} • {conn.to.airport}</p>
                </div>
                <span className="text-xs font-semibold text-blue-600">Track →</span>
              </div>
              <div className="grid grid-cols-3 gap-2 mb-3">
                <div className="bg-neutral-50 rounded-xl p-2.5 text-center">
                  <p className="text-[10px] text-neutral-500 uppercase font-bold tracking-wider">Departs</p>
                  <p className="text-sm font-bold mt-0.5">{departTime}</p>
                </div>
                <div className="bg-neutral-50 rounded-xl p-2.5 text-center">
                  <p className="text-[10px] text-neutral-500 uppercase font-bold tracking-wider">Gate</p>
                  <p className="text-sm font-bold mt-0.5">T{conn.departs_from.terminal} • {conn.departs_from.gate}</p>
                </div>
                <div className="bg-neutral-50 rounded-xl p-2.5 text-center">
                  <p className="text-[10px] text-neutral-500 uppercase font-bold tracking-wider">Walk</p>
                  <p className="text-sm font-bold mt-0.5">{conn.walk_to_gate_minutes} min</p>
                </div>
              </div>
              <div className="flex items-center justify-between text-[11px]">
                <p className="text-neutral-500">⏱ Layover: <span className="font-semibold text-neutral-700">{layoverH}h {layoverM}m</span></p>
                {conn.baggage_checked_through && (
                  <p className="text-emerald-700 font-semibold">✓ Bags checked through to {conn.to.iata}</p>
                )}
              </div>
            </div>
          );
        })()}

        {/* Walk to pickup */}
        <div className="bg-white rounded-2xl p-4 mb-3 shadow-sm">
          <p className="text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Uber pickup</p>
          <div className="flex items-center gap-3">
            <div className="w-12 h-12 rounded-full bg-black flex items-center justify-center text-xl">🚗</div>
            <div className="flex-1">
              <p className="font-bold text-sm">{dest.pickup_zone}</p>
              <p className="text-xs text-neutral-500">{dest.walk_to_uber_pickup_minutes} min walk from baggage</p>
            </div>
          </div>
        </div>

        {/* Fare estimates */}
        <div className="bg-white rounded-2xl p-4 mb-3 shadow-sm">
          <div className="flex items-center justify-between mb-3">
            <p className="text-[11px] font-bold text-neutral-500 uppercase tracking-wider">Estimated ride to Manhattan</p>
            <span className="text-xs text-neutral-400">~32 min</span>
          </div>
          {dest.fare_estimates.map((f, i) => (
            <button
              key={i}
              onClick={() => setSelected(i)}
              className={`w-full flex items-center gap-3 p-3 rounded-xl mb-1.5 text-left transition ${selected === i ? 'bg-neutral-100 ring-2 ring-black' : 'hover:bg-neutral-50'}`}
            >
              <div className="w-10 h-10 rounded-full bg-white flex items-center justify-center text-xl shadow-sm">{f.icon}</div>
              <div className="flex-1">
                <div className="flex items-center gap-2">
                  <p className="font-bold text-sm">{f.product}</p>
                  <span className="text-[10px] text-neutral-500">• {f.capacity} seats</span>
                </div>
                <p className="text-[11px] text-neutral-500">{f.eta_minutes} min away</p>
              </div>
              <p className="font-bold text-sm">${f.low}–${f.high}</p>
            </button>
          ))}
        </div>

        {/* Food at airport */}
        {dest.food_at_airport.length > 0 && (
          <div className="bg-white rounded-2xl p-4 mb-3 shadow-sm">
            <p className="text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Hungry before next flight?</p>
            {dest.food_at_airport.map((f, i) => (
              <div key={i} className="flex items-center gap-3 py-2">
                <div className="w-10 h-10 rounded-full bg-neutral-100 flex items-center justify-center text-lg">{f.image}</div>
                <div className="flex-1">
                  <p className="font-semibold text-sm">{f.name}</p>
                  <p className="text-xs text-neutral-500">{f.cuisine} • {f.terminal}</p>
                </div>
                <span className="text-xs">⭐ {f.rating}</span>
              </div>
            ))}
          </div>
        )}

        {/* Food near destination */}
        <div className="bg-white rounded-2xl p-4 mb-3 shadow-sm">
          <p className="text-[11px] font-bold text-neutral-500 uppercase tracking-wider mb-2">Explore Uber Eats at your destination</p>
          {dest.food_nearby.map((f, i) => (
            <div key={i} className="flex items-center gap-3 py-2">
              <div className="w-10 h-10 rounded-full bg-neutral-100 flex items-center justify-center text-lg">{f.image}</div>
              <div className="flex-1">
                <p className="font-semibold text-sm">{f.name}</p>
                <p className="text-xs text-neutral-500">{f.cuisine} • {f.distance}</p>
              </div>
              <span className="text-xs">⭐ {f.rating}</span>
            </div>
          ))}
        </div>

        <button className="w-full bg-black text-white font-bold rounded-xl py-4 mb-2">
          Book {dest.fare_estimates[selected].product} • ${dest.fare_estimates[selected].low}–${dest.fare_estimates[selected].high}
        </button>
        <button onClick={onRestart} className="w-full text-neutral-500 text-xs font-semibold py-2">
          ↻ Restart demo
        </button>
      </div>
    </div>
  );
};

/* ─────────────────────────────────────────────────────────────
   APP ROOT
   ───────────────────────────────────────────────────────────── */

const SCREENS = [
  { id: 'ride',   label: 'In-Ride', full: 'In-Ride to SFO' },
  { id: 'add',    label: 'Flight',  full: 'Add Flight' },
  { id: 'intel',  label: 'Intel',   full: 'Flight Intel' },
  { id: 'landed', label: 'Landed',  full: 'Landed at JFK' },
];

const DEFAULT_FLIGHT = MOCK_FLIGHTS['DL458'];

const App = () => {
  const initialFromHash = (() => {
    const h = (typeof window !== 'undefined' ? window.location.hash : '').replace('#', '');
    return SCREENS.find(s => s.id === h)?.id || 'ride';
  })();
  const [screen, setScreen] = useState(initialFromHash);
  const [flight, setFlight] = useState(initialFromHash !== 'ride' && initialFromHash !== 'add' ? DEFAULT_FLIGHT : null);

  const idx = SCREENS.findIndex(s => s.id === screen);

  // Jump to any screen — auto-load default flight if needed for screens 3–5.
  const jumpTo = (id) => {
    const targetIdx = SCREENS.findIndex(s => s.id === id);
    if (targetIdx >= 2 && !flight) setFlight(DEFAULT_FLIGHT);
    setScreen(id);
  };

  return (
    <div className="min-h-screen w-full flex items-center justify-center py-10 px-4" style={{ background: 'radial-gradient(ellipse at top, #1a1a1a 0%, #000 80%)' }}>
      <div className="flex flex-col items-center gap-6">
        {/* Title */}
        <div className="text-center max-w-md">
          <p className="text-[11px] font-bold text-white/40 tracking-[0.3em] uppercase mb-1">Uber Airport — Prototype</p>
          <h1 className="text-white text-2xl font-bold">In-Ride Flight Intelligence</h1>
          <p className="text-white/50 text-sm mt-1">Capture flight details during the ride. Unlock everything from gate info to destination Uber estimates.</p>
        </div>

        {/* Phone */}
        <div key={screen} className="anim-fade-in">
          <PhoneFrame>
            <StatusBar />
            {screen === 'ride' && <Screen1_InRide onAddFlight={() => setScreen('add')} onNext={() => setScreen('add')} />}
            {screen === 'add' && <Screen2_AddFlight onSubmit={(f) => { setFlight(f); setScreen('intel'); }} onBack={() => setScreen('ride')} />}
            {screen === 'intel' && flight && <Screen3_FlightIntel flight={flight} onNext={() => setScreen('landed')} onBack={() => setScreen('add')} />}
            {screen === 'landed' && flight && <Screen5_Landed flight={flight} onBack={() => setScreen('intel')} onRestart={() => { setFlight(null); setScreen('ride'); }} />}
          </PhoneFrame>
        </div>

        {/* Bottom pagination — jump to any screen */}
        <div className="flex flex-col items-center gap-3 w-full max-w-[640px]">
          {/* Prev / Next */}
          <div className="flex items-center gap-2 w-full justify-between">
            <button
              onClick={() => idx > 0 && jumpTo(SCREENS[idx - 1].id)}
              disabled={idx === 0}
              className="flex items-center gap-1.5 text-white/60 hover:text-white text-xs font-semibold px-3 py-2 rounded-lg disabled:opacity-30 disabled:cursor-not-allowed transition"
            >
              ← Prev
            </button>
            <p className="text-[10px] font-bold text-white/40 tracking-[0.2em] uppercase">
              Screen {idx + 1} of {SCREENS.length} • {SCREENS[idx].full}
            </p>
            <button
              onClick={() => idx < SCREENS.length - 1 && jumpTo(SCREENS[idx + 1].id)}
              disabled={idx === SCREENS.length - 1}
              className="flex items-center gap-1.5 text-white/60 hover:text-white text-xs font-semibold px-3 py-2 rounded-lg disabled:opacity-30 disabled:cursor-not-allowed transition"
            >
              Next →
            </button>
          </div>

          {/* Numbered jump pills */}
          <div className="max-w-full overflow-x-auto">
            <div className="flex items-center gap-1.5 bg-white/5 backdrop-blur rounded-2xl p-1.5 border border-white/10 w-max mx-auto">
              {SCREENS.map((s, i) => {
                const active = s.id === screen;
                return (
                  <button
                    key={s.id}
                    onClick={() => jumpTo(s.id)}
                    className={`flex items-center gap-1.5 px-2.5 py-1.5 rounded-xl transition whitespace-nowrap ${active ? 'bg-white text-black shadow-lg' : 'text-white/70 hover:bg-white/10'}`}
                  >
                    <span className={`w-5 h-5 rounded-full flex items-center justify-center text-[10px] font-bold ${active ? 'bg-black text-white' : 'bg-white/10'}`}>{i+1}</span>
                    <span className="text-xs font-semibold">{s.label}</span>
                  </button>
                );
              })}
            </div>
          </div>

          <p className="text-[10px] text-white/40 leading-relaxed text-center mt-1">
            <span className="text-white/60 font-semibold">Tip:</span> follow the natural flow from screen 1 — or jump to any step. Try flight numbers <span className="font-mono text-white/70">DL458</span> or <span className="font-mono text-white/70">UA1242</span>.
          </p>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
